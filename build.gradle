plugins {
    id 'java'
    id 'application'
}

group = 'com.novusforge.astrum'
version = '0.1.0-SNAPSHOT'

System.setProperty('lwjgl.natives', 'natives-linux-arm64')

ext {
    set('lwjgl.natives', 'natives-linux-arm64')
}

configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.name.contains("lwjgl") && details.requested.version.contains("natives")) {
             details.useVersion(details.requested.version.replace('${lwjgl.natives}', 'natives-linux-arm64'))
        }
        // Force the version string if it literal matches the placeholder
        if (details.requested.version == '${lwjgl.natives}') {
            details.useVersion('natives-linux-arm64')
        }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
    maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
}

dependencies {
    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'
    implementation 'org.slf4j:slf4j-simple:2.0.12'
    implementation libs.joml
    implementation libs.bundles.lwjgl
    implementation(libs.vkbootstrap) {
        exclude group: 'org.lwjgl'
    }

    // Natives for Linux
    runtimeOnly variantOf(libs.lwjgl) { classifier("natives-linux-arm64") }
    runtimeOnly variantOf(libs.lwjgl.glfw) { classifier("natives-linux-arm64") }
    runtimeOnly variantOf(libs.lwjgl.stb) { classifier("natives-linux-arm64") }
    runtimeOnly variantOf(libs.lwjgl.shaderc) { classifier("natives-linux-arm64") }
    runtimeOnly variantOf(libs.lwjgl.vma) { classifier("natives-linux-arm64") }
    runtimeOnly variantOf(libs.lwjgl.assimp) { classifier("natives-linux-arm64") }
    runtimeOnly variantOf(libs.lwjgl.openal) { classifier("natives-linux-arm64") }

    testImplementation libs.junit.api
    testRuntimeOnly libs.junit.engine
}

application {
    mainClass = 'com.novusforge.astrum.game.Main'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += [
        '--enable-preview'
    ]
}

tasks.withType(JavaExec).configureEach {
    jvmArgs += [
        '-Xmx512m',
        '-Xms128m',
        '-XX:+UseG1GC',
        '-XX:MaxGCPauseMillis=50',
        '--enable-preview',
        '--enable-native-access=ALL-UNNAMED'
    ]
    environment "LD_LIBRARY_PATH", (System.getenv("LD_LIBRARY_PATH") ?: "") + ":/usr/lib/jvm/java-21-openjdk-arm64/lib"
}

test {
    useJUnitPlatform()
}